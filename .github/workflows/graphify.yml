name: Graphify

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'package.json'
      - '.graphifyignore'
  workflow_dispatch:

jobs:
  update-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install graphifyy
      - name: Build knowledge graph
        run: |
          mkdir -p graphify-out
          python3 -c "
          import json
          from graphify.detect import detect
          from graphify.extract import collect_files, extract
          from graphify.build import build_from_json
          from graphify.cluster import cluster, score_all
          from graphify.analyze import god_nodes, surprising_connections, suggest_questions
          from graphify.report import generate
          from graphify.export import to_json, to_html
          from pathlib import Path

          det = detect(Path('.'))
          code_files = []
          for f in det['files']['code']:
              p = Path(f)
              code_files.extend(collect_files(p) if p.is_dir() else [p])

          if not code_files:
              print('No code files found')
              raise SystemExit(0)

          extraction = extract(code_files)
          G = build_from_json(extraction)
          communities = cluster(G)
          cohesion = score_all(G, communities)
          gods = god_nodes(G)
          surprises = surprising_connections(G, communities)
          labels = {cid: 'Community ' + str(cid) for cid in communities}
          questions = suggest_questions(G, communities, labels)

          detection = {'total_files': det['total_files'], 'total_words': det['total_words'],
                       'needs_graph': False, 'warning': None,
                       'files': {'code': [], 'document': [], 'paper': []}}
          tokens = {'input': 0, 'output': 0}

          report = generate(G, communities, cohesion, labels, gods, surprises,
                          detection, tokens, '.', suggested_questions=questions)
          Path('graphify-out/GRAPH_REPORT.md').write_text(report)
          to_json(G, communities, 'graphify-out/graph.json')
          to_html(G, communities, 'graphify-out/graph.html')

          print(f'Graph: {G.number_of_nodes()} nodes, {G.number_of_edges()} edges, {len(communities)} communities')
          "
      - name: Commit updated graph
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graphify-out/GRAPH_REPORT.md graphify-out/graph.json graphify-out/graph.html
          if git diff --cached --quiet; then
            echo "No changes to graph"
          else
            git commit -m "chore: update graphify knowledge graph"
            git push
          fi
